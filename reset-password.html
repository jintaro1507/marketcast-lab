<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新しいパスワードの設定 ｜ Marketcast Lab</title>
<style>
  :root{
    --paper:#F2EFE8; --paper-deep:#E8E3D7; --ink:#1C1A16; --ink-soft:#5B564B;
    --line-rule:#cfc7b6;
    --display:"Shippori Mincho","Noto Serif JP",serif;
    --body:"Zen Kaku Gothic New","Noto Sans JP",sans-serif;
    --mono:"JetBrains Mono","Courier New",monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--paper);color:var(--ink);font-family:var(--body);line-height:1.7;-webkit-font-smoothing:antialiased;}
  a{color:var(--ink);text-decoration:none;}
  a:hover{text-decoration:underline;}

  header{
    border-bottom:1px solid var(--line-rule);
    padding:18px 5vw 16px;
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:10px;
  }
  .brand{font-family:var(--display);font-size:22px;letter-spacing:0.04em;display:flex;align-items:baseline;gap:10px;}
  .brand .mark{font-family:var(--mono);font-size:11px;color:var(--ink-soft);border:1px solid var(--line-rule);padding:2px 6px;border-radius:2px;letter-spacing:0.08em;}
  nav{display:flex;gap:28px;font-size:13px;letter-spacing:0.03em;color:var(--ink-soft);}
  nav a{color:var(--ink-soft);}
  nav a:hover{color:var(--ink);}

  .page-wrap{max-width:420px;margin:64px auto 80px;padding:0 5vw;}
  h1{font-family:var(--display);font-size:22px;font-weight:400;letter-spacing:0.04em;margin:0 0 32px;}

  /* セッション確認中インジケーター */
  .checking{font-size:13px;color:var(--ink-soft);margin-bottom:16px;}

  /* 無効リンク案内 */
  .invalid-notice{
    font-size:13px;
    padding:12px 14px;
    border-radius:2px;
    background:#f5eae8;
    color:#5a1a14;
    border:1px solid #d4b0ac;
    margin-bottom:20px;
  }

  .auth-form{display:flex;flex-direction:column;gap:18px;}
  .field{display:flex;flex-direction:column;gap:6px;}
  label{font-size:13px;color:var(--ink-soft);letter-spacing:0.02em;}
  input[type="password"]{
    background:var(--paper-deep);
    border:1px solid var(--line-rule);
    border-radius:2px;
    padding:10px 12px;
    font-family:var(--body);
    font-size:14px;
    color:var(--ink);
    outline:none;
    width:100%;
  }
  input[type="password"]:focus{border-color:var(--ink-soft);}

  .field-note{font-size:11.5px;color:var(--ink-soft);margin-top:2px;}

  .submit-btn{
    margin-top:8px;
    background:var(--ink);
    color:var(--paper);
    border:none;
    border-radius:2px;
    padding:12px 20px;
    font-family:var(--body);
    font-size:14px;
    letter-spacing:0.04em;
    cursor:pointer;
    width:100%;
  }
  .submit-btn:hover{opacity:0.85;}
  .submit-btn:disabled{opacity:0.5;cursor:not-allowed;}

  .auth-msg{font-size:13px;padding:10px 12px;border-radius:2px;margin-bottom:4px;}
  .auth-msg--ok{background:#e8f0eb;color:#1a4a2e;border:1px solid #b0d4bc;}
  .auth-msg--error{background:#f5eae8;color:#5a1a14;border:1px solid #d4b0ac;}

  .auth-links{margin-top:24px;font-size:13px;color:var(--ink-soft);}
  .auth-links a{color:var(--ink-soft);}
  .auth-links a:hover{color:var(--ink);}

  footer{border-top:1px solid var(--line-rule);padding:20px 5vw;font-size:12px;color:var(--ink-soft);margin-top:auto;}
</style>
</head>
<body data-auth-page="reset-password">

<header>
  <div class="brand"><a href="index.html">Marketcast Lab</a> <span class="mark">観測所</span></div>
  <nav>
    <a href="index.html#events">イベント観測</a>
    <a href="index.html#assets">資産別反応史</a>
    <a href="glossary.html">用語解説</a>
    <a href="disclaimer.html">免責事項</a>
    <a href="login.html" data-auth-link>ログイン</a>
  </nav>
</header>

<div class="page-wrap">
  <h1>新しいパスワードの設定</h1>

  <!-- セッション確認中（JS制御で非表示になる） -->
  <p class="checking" id="reset-checking">セッションを確認しています…</p>

  <!-- 無効・期限切れリンク案内 -->
  <div id="reset-invalid" hidden>
    <p class="invalid-notice">
      再設定リンクが無効または期限切れです。再度パスワード再設定を行ってください。
    </p>
    <div class="auth-links">
      <a href="forgot-password.html">パスワード再設定に戻る</a>
    </div>
  </div>

  <!-- パスワード更新フォーム（有効なセッション確認後に表示） -->
  <div id="reset-form-wrapper" hidden>
    <p id="auth-message" class="auth-msg" hidden></p>

    <form id="reset-form" class="auth-form" novalidate>
      <div class="field">
        <label for="new-password">新しいパスワード</label>
        <input type="password" id="new-password" name="new-password" autocomplete="new-password" required>
        <span class="field-note">8文字以上で入力してください。</span>
      </div>
      <div class="field">
        <label for="confirm-password">新しいパスワード（確認）</label>
        <input type="password" id="confirm-password" name="confirm-password" autocomplete="new-password" required>
      </div>
      <button type="submit" class="submit-btn">パスワードを更新する</button>
    </form>
  </div>
</div>

<footer>Marketcast Lab — β版</footer>

<script type="module" src="assets/js/auth-pages.js"></script>
<script type="module" src="assets/js/auth-common.js"></script>
</body>
</html>
