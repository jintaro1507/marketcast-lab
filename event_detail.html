<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>イベント詳細 ｜ Marketcast Lab</title>
<style>
  :root{
    --paper:#F2EFE8; --paper-deep:#E8E3D7; --ink:#1C1A16; --ink-soft:#5B564B;
    --line-rule:#cfc7b6;
    --oil:#B5703A; --gold:#9C7A2E; --equity:#38456B; --crypto:#6B4A8A;
    --fx:#4A6B5A; --bond:#7A6A55;
    --up:#8A3B2E; --down:#2F5D4E;
    --display:"Shippori Mincho","Noto Serif JP",serif;
    --body:"Zen Kaku Gothic New","Noto Sans JP",sans-serif;
    --mono:"JetBrains Mono","Courier New",monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--paper);color:var(--ink);font-family:var(--body);line-height:1.7;-webkit-font-smoothing:antialiased;}
  a{color:inherit;text-decoration:none;}

  .strip{background:var(--ink);color:var(--paper);font-size:12px;padding:8px 5vw;}
  .strip b{font-weight:600;}
  header{border-bottom:1px solid var(--line-rule);padding:18px 5vw 16px;display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:10px;}
  .brand{font-family:var(--display);font-size:20px;letter-spacing:0.04em;display:flex;align-items:baseline;gap:10px;}
  .brand .mark{font-family:var(--mono);font-size:11px;color:var(--ink-soft);border:1px solid var(--line-rule);padding:2px 6px;border-radius:2px;letter-spacing:0.08em;}
  nav{display:flex;gap:24px;font-size:13px;color:var(--ink-soft);}
  nav a:hover{color:var(--ink);}

  .breadcrumb{padding:20px 5vw 0;font-family:var(--mono);font-size:11px;color:var(--ink-soft);}
  .breadcrumb a{border-bottom:1px solid var(--line-rule);}

  .ev-head{padding:14px 5vw 26px;border-bottom:1px solid var(--line-rule);}
  .ev-head .date{font-family:var(--mono);font-size:12px;color:var(--ink-soft);margin-bottom:10px;}
  .ev-head h1{font-family:var(--display);font-size:clamp(24px,3.2vw,34px);margin:0 0 14px;max-width:28ch;}
  .ev-head p{max-width:62ch;color:var(--ink-soft);font-size:14px;margin:0 0 16px;}
  .ev-head .tags{display:flex;gap:6px;flex-wrap:wrap;}
  .ev-head .tags a{font-family:var(--mono);font-size:10.5px;color:var(--ink-soft);border:1px solid var(--line-rule);padding:3px 9px;border-radius:2px;}
  .ev-head .tags a:hover{border-color:var(--ink-soft);color:var(--ink);}
  .ev-head .tag-block{display:flex;align-items:center;gap:10px;margin-top:12px;flex-wrap:wrap;}
  .ev-head .tag-label{font-family:var(--mono);font-size:10px;letter-spacing:0.06em;color:var(--ink-soft);min-width:auto;}
  .ev-head .effects{display:flex;gap:6px;flex-wrap:wrap;}
  .ev-head .effect-chip{font-family:var(--mono);font-size:10.5px;color:var(--down);border:1px solid var(--line-rule);background:var(--paper-deep);padding:3px 9px;border-radius:2px;}

  .section-label{font-family:var(--mono);font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-soft);padding:32px 5vw 0;}

  /* propagation */
  .prop{padding:14px 5vw 0;}
  .prop-flow{display:flex;flex-wrap:wrap;align-items:center;gap:10px;background:var(--paper-deep);border:1px solid var(--line-rule);padding:20px;}
  .prop-flow .node{background:var(--paper);border:1px solid var(--line-rule);padding:8px 14px;font-size:13px;border-radius:2px;}
  .prop-flow .arrow{color:var(--ink-soft);font-family:var(--mono);}

  /* reaction table */
  .react-wrap{padding:14px 5vw 0;overflow-x:auto;}
  table.react{width:100%;border-collapse:collapse;font-size:13px;min-width:620px;}
  table.react th{text-align:right;font-family:var(--mono);font-size:10.5px;letter-spacing:0.04em;color:var(--ink-soft);text-transform:uppercase;border-bottom:1px solid var(--line-rule);padding:9px 12px;}
  table.react th:first-child{text-align:left;}
  table.react td{padding:13px 12px;border-bottom:1px solid var(--line-rule);text-align:right;font-family:var(--mono);}
  table.react td:first-child{text-align:left;font-family:var(--body);}
  .asset-name{display:flex;align-items:center;gap:8px;}
  .swatch{width:9px;height:9px;border-radius:2px;display:inline-block;flex-shrink:0;}
  .swatch.oil{background:var(--oil);}.swatch.gold{background:var(--gold);}
  .swatch.equity{background:var(--equity);}.swatch.fx{background:var(--fx);}.swatch.bond{background:var(--bond);}
  .pos{color:var(--up);} .neg{color:var(--down);}
  .restricted-note{font-family:var(--body);font-size:10px;color:var(--ink-soft);}

  .react-note{font-family:var(--mono);font-size:10.5px;color:var(--ink-soft);padding:10px 5vw 0;}

  .related{padding:14px 5vw 0;}
  .related a{display:inline-block;font-size:13px;border:1px solid var(--line-rule);padding:8px 16px;border-radius:2px;color:var(--ink-soft);}
  .related a:hover{border-color:var(--ink-soft);color:var(--ink);}

  footer{margin-top:50px;border-top:1px solid var(--line-rule);padding:28px 5vw 50px;font-size:12px;color:var(--ink-soft);}
  footer .back{display:inline-block;margin-bottom:12px;border-bottom:1px solid var(--line-rule);}
  footer .disclaimer{max-width:64ch;line-height:1.8;}
  .empty{padding:40px 5vw;color:var(--ink-soft);font-size:14px;}

  /* category badge */
  .cat-badge{display:inline-block;font-family:var(--mono);font-size:10.5px;letter-spacing:0.06em;color:var(--ink-soft);border:1px solid var(--line-rule);padding:3px 9px;border-radius:2px;margin-bottom:12px;}

  /* similarity reason */
  .reason{padding:14px 5vw 0;}
  .reason .reason-box{background:var(--paper-deep);border:1px solid var(--line-rule);border-left:3px solid var(--ink-soft);padding:16px 18px;max-width:64ch;}
  .reason .reason-box p{margin:0;font-size:13.5px;line-height:1.85;}

  /* horizon switch */
  .horizon-switch{display:flex;gap:6px;padding:14px 5vw 0;flex-wrap:wrap;}
  .horizon-switch .hbtn{font-family:var(--mono);font-size:11.5px;border:1px solid var(--line-rule);padding:5px 12px;border-radius:2px;color:var(--ink-soft);cursor:pointer;background:var(--paper);}
  .horizon-switch .hbtn:hover{border-color:var(--ink-soft);color:var(--ink);}
  .horizon-switch .hbtn.active{background:var(--ink);color:var(--paper);border-color:var(--ink);}
  table.react td.hl,table.react th.hl{background:rgba(0,0,0,0.04);}

  /* sources */
  .sources{padding:14px 5vw 0;}
  .sources ul{list-style:none;margin:0;padding:0;}
  .sources li{font-size:13px;padding:6px 0;border-bottom:1px dashed var(--line-rule);}
  .sources li a{border-bottom:1px solid var(--line-rule);color:var(--ink-soft);}
  .sources li a:hover{color:var(--ink);}
  .sources .src-note{font-size:11px;color:var(--ink-soft);margin-top:8px;}

  /* why_reaction */
  .why{padding:14px 5vw 0;}
  .why p{max-width:64ch;font-size:14px;line-height:1.9;margin:0;}

  /* contrast card */
  .contrast{padding:14px 5vw 0;}
  .contrast-card{border:1px solid var(--line-rule);background:var(--paper-deep);padding:0;overflow:hidden;max-width:760px;}
  .contrast-axis{background:var(--ink);color:var(--paper);font-size:12.5px;padding:10px 18px;font-family:var(--mono);letter-spacing:0.02em;}
  .contrast-axis b{color:var(--paper);}
  .contrast-sides{display:grid;grid-template-columns:1fr auto 1fr;align-items:stretch;}
  .contrast-side{padding:18px;}
  .contrast-side.this{background:rgba(138,59,46,0.05);}
  .contrast-side .role{font-family:var(--mono);font-size:10px;color:var(--ink-soft);margin-bottom:6px;letter-spacing:0.06em;}
  .contrast-side .ev-name{font-family:var(--display);font-size:15px;margin-bottom:8px;line-height:1.5;}
  .contrast-side .ev-name a{border-bottom:1px solid var(--line-rule);}
  .contrast-side .ev-name a:hover{color:var(--ink);}
  .contrast-side .side-axis{font-size:13px;color:var(--ink);}
  .contrast-mid{display:flex;align-items:center;justify-content:center;padding:0 6px;font-size:18px;color:var(--ink-soft);}
  .contrast-outcome{border-top:1px solid var(--line-rule);padding:16px 18px;font-size:13px;line-height:1.85;}
  .contrast-outcome::before{content:"→ ";color:var(--ink-soft);}

  /* key_insight */
  .insight{padding:14px 5vw 0;}
  .insight-box{border:1px solid var(--line-rule);border-left:3px solid var(--gold);background:var(--paper-deep);padding:18px;max-width:64ch;}
  .insight-box p{margin:0 0 10px;font-size:14px;line-height:1.9;}
  .insight-box .insight-note{font-size:11px;color:var(--ink-soft);margin:0;padding-top:8px;border-top:1px dashed var(--line-rule);}

  /* context_snapshot */
  .ctx{padding:14px 5vw 0;}
  .ctx-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1px;border:1px solid var(--line-rule);background:var(--line-rule);}
  .ctx-cell{background:var(--paper);padding:14px 16px;}
  .ctx-cell .ctx-label{font-family:var(--mono);font-size:10px;letter-spacing:0.06em;color:var(--ink-soft);margin-bottom:6px;}
  .ctx-cell .ctx-val{font-family:var(--mono);font-size:18px;font-weight:500;line-height:1.2;}
  .ctx-cell .ctx-unit{font-family:var(--mono);font-size:11px;color:var(--ink-soft);margin-left:3px;}
  .ctx-cell .ctx-na{font-family:var(--mono);font-size:18px;color:var(--ink-soft);}
  .ctx-cell .ctx-note{font-family:var(--mono);font-size:9.5px;color:var(--ink-soft);margin-top:4px;opacity:0.8;}
  .ctx-caption{font-family:var(--mono);font-size:10.5px;color:var(--ink-soft);padding:8px 0 0;max-width:64ch;}

  @media (max-width:680px){
    .contrast-sides{grid-template-columns:1fr;}
    .contrast-mid{padding:8px 0;transform:rotate(90deg);}
    .ctx-grid{grid-template-columns:repeat(2,1fr);}
  }

  /* Reaction Timeline（プレミアム） */
  .tl-section{padding:14px 5vw 0;}
  .tl-disclaimer{font-family:var(--mono);font-size:10px;color:var(--ink-soft);margin-bottom:10px;max-width:64ch;line-height:1.7;border:1px solid var(--line-rule);background:var(--paper-deep);padding:10px 12px;}
  .tl-wrap{overflow-x:auto;}
  table.tl-table{border-collapse:collapse;font-size:13px;min-width:400px;width:100%;}
  table.tl-table th{text-align:left;font-family:var(--mono);font-size:10.5px;letter-spacing:0.04em;color:var(--ink-soft);border-bottom:1px solid var(--line-rule);padding:8px 12px;}
  table.tl-table td{padding:11px 12px;border-bottom:1px solid var(--line-rule);font-family:var(--mono);}
  table.tl-table td:first-child{font-family:var(--body);}
  .tl-dir{text-align:center;}
  .dir-up{color:var(--up);}
  .dir-down{color:var(--down);}
  .dir-flat{color:var(--ink-soft);}
  .dir-reversal{font-size:9px;font-family:var(--mono);color:var(--ink-soft);border:1px solid var(--line-rule);background:var(--paper-deep);padding:1px 5px;border-radius:2px;white-space:nowrap;}
  .tl-gate{padding:14px 5vw 0;}
  .tl-gate-inner{background:var(--paper-deep);border:1px solid var(--line-rule);padding:16px 18px;max-width:540px;}
  .tl-gate-msg{margin:0 0 12px;font-size:13.5px;color:var(--ink-soft);}
  .tl-gate-links{display:flex;gap:10px;flex-wrap:wrap;}
  .tl-gate-link{font-size:13px;border:1px solid var(--line-rule);padding:7px 14px;border-radius:2px;color:var(--ink-soft);}
  .tl-gate-link:hover{border-color:var(--ink-soft);color:var(--ink);}
  .tl-error{padding:14px 5vw 0;font-size:13px;color:var(--ink-soft);}
  .tl-error-link{margin-left:10px;border-bottom:1px solid var(--line-rule);}
  .tl-loading{padding:14px 5vw 0;font-family:var(--mono);font-size:12px;color:var(--ink-soft);}
  .tl-nodata{font-size:13px;color:var(--ink-soft);}
  @media(max-width:680px){.dir-reversal{display:none;}}
</style>
</head>
<body>

<div class="strip"><b>本サイトは情報提供・教育目的です。</b>個別の投資助言ではありません。最終判断はご自身の責任で行ってください。</div>

<header>
  <div class="brand"><a href="index.html">Marketcast Lab</a> <span class="mark">観測所</span></div>
  <nav>
    <a href="index.html#events">イベント観測</a>
    <a href="index.html#assets">資産別反応史</a>
    <a href="glossary.html">用語解説</a>
    <a href="disclaimer.html">免責事項</a>
    <a href="login.html" data-auth-link>ログイン</a>
  </nav>
</header>

<div id="content"></div>

<script>
(async function(){
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  const content = document.getElementById('content');

  const horizonLabels = {d1:'1日後', d7:'7日後', d30:'30日後', d90:'90日後'};
  function pct(v){ if(v===null||v===undefined) return '—'; return (v>0?'+':'')+v.toFixed(1)+'%'; }
  function cls(v){ if(v===null||v===undefined) return ''; return v>0?'pos':(v<0?'neg':''); }

  // context_snapshot 表示ヘルパー
  function renderContextSnapshot(ev){
    const cs = ev.context_snapshot;
    if(!cs) return '';
    const baseDate = ev.date;

    // 値フォーマット: null/undefined → null、0 は 0 として表示
    function fmtVal(v){ return (v === null || v === undefined) ? null : v; }

    // VIX・原油の欠損注記: oil_shock_1973 のみ対象時期の理由を出し分け、それ以外は汎用文言
    const noSeriesNote = ev.id === 'oil_shock_1973'
      ? '対象時期に利用できる系列データがありません'
      : 'この指標のデータは収録されていません';

    const items = [
      { key:'vix_level',      label:'VIX',          unit:'',        decimals:2,
        naNote: noSeriesNote },
      { key:'oil_price_wti',  label:'WTI原油',       unit:'USD/bbl', decimals:1,
        naNote: noSeriesNote },
      { key:'fed_funds_rate', label:'FF金利',         unit:'%',       decimals:2,
        naNote:'この指標のデータは収録されていません' },
      { key:'ust10y_yield',   label:'米10年債利回り',  unit:'%',       decimals:2,
        naNote:'この指標のデータは収録されていません' },
      { key:'cpi_yoy',        label:'CPI前年比',      unit:'%',       decimals:1,
        naNote:'このイベントのCPIデータは収録されていません', presentNote:'月次データ' },
    ];

    const cells = items.map(item => {
      const raw = fmtVal(cs[item.key]);
      let valHtml, noteHtml;
      if(raw !== null){
        valHtml = `<span class="ctx-val">${raw.toFixed(item.decimals)}<span class="ctx-unit">${item.unit ? '\u2009' + item.unit : ''}</span></span>`;
        noteHtml = item.presentNote ? `<div class="ctx-note">${item.presentNote}</div>` : '';
      } else {
        valHtml = `<span class="ctx-na">—</span>`;
        noteHtml = item.naNote ? `<div class="ctx-note">${item.naNote}</div>` : '';
      }
      return `<div class="ctx-cell"><div class="ctx-label">${item.label}</div>${valHtml}${noteHtml}</div>`;
    }).join('');

    const dateNote = baseDate ? `基準日: ${baseDate} 時点（休場日の場合は直前の取引日）` : '';

    return `<div class="section-label">イベント発生時の市場環境</div>
      <div class="ctx">
        <div class="ctx-grid">${cells}</div>
        <div class="ctx-caption">各値はイベント基準日時点またはその直前に取得可能だったデータです。${dateNote ? dateNote + '。' : ''}現在の市場状況ではありません。</div>
      </div>`;
  }

  let data;
  try{
    const res = await fetch('data/event_reactions.json', {cache:'no-store'});
    data = await res.json();
  }catch(e){
    content.innerHTML = '<div class="empty">データを読み込めませんでした。</div>'; return;
  }

  const causeLabels = data.cause_tag_labels || {};
  const effectLabels = data.effect_tag_labels || {};
  const ev = (data.events||[]).find(e => e.id === id) || data.events[0];
  if(!ev){ content.innerHTML = '<div class="empty">イベントが見つかりませんでした。</div>'; return; }

  document.title = ev.name + ' ｜ Marketcast Lab';

  const causeTags = ev.cause_tags || [];
  const effectTags = ev.effect_tags || [];
  const effectDetails = ev.effect_tag_details || {};
  const primaryCause = causeTags[0] || '';

  // period情報付きのタグラベル生成。例: oil_up+["d1","d7"] → "原油上昇（1日・7日）"
  const PERIOD_LABELS = {d1:'1日', d7:'7日', d30:'30日'};
  function effectChipLabel(tag){
    const base = effectLabels[tag] || tag;
    const periods = (effectDetails[tag] || []).map(p => PERIOD_LABELS[p] || p);
    return periods.length ? `${base}（${periods.join('・')}）` : base;
  }

  const causeHtml = causeTags.map(t=>`<a href="similar_events.html?tag=${t}">${causeLabels[t]||t}</a>`).join('');

  // effect_tags：同一資産の上昇・下落が共存する場合（例: vix_up + vix_down）を検出
  const hasVixBoth = effectTags.includes('vix_up') && effectTags.includes('vix_down');
  const effectHtml = effectTags.length
    ? effectTags.map(t=>`<span class="effect-chip">${effectChipLabel(t)}</span>`).join('')
    : '<span style="color:var(--ink-soft);font-size:12.5px;">該当する結果タグはありません</span>';
  // 上昇・下落が共存するときは時系列注記を追加
  const effectConflictNote = hasVixBoth
    ? `<div style="font-family:var(--mono);font-size:10px;color:var(--ink-soft);margin-top:4px;opacity:0.8;">VIXは初期に急騰（7日後）し、その後政策対応で低下（30日後）しています。括弧内の日数は各判定を超えた期間を示します。</div>`
    : '';

  // 伝播フロー
  const flowHtml = (ev.propagation||[]).map((n,i)=>
    (i>0?'<span class="arrow">→</span>':'') + `<span class="node">${n}</span>`
  ).join('');

  // カテゴリ
  const catLabels = data.category_labels || {};
  const catBadge = ev.category ? `<div class="cat-badge">カテゴリ: ${catLabels[ev.category]||ev.category}</div>` : '';

  // 反応テーブル
  const horizons = data.horizons || ['d1','d7','d30','d90'];
  const order = ['wti','gold','sp500','ust10y','usdjpy','vix'];

  function buildTable(activeH){
    const thHorizons = horizons.map(h=>`<th class="${h===activeH?'hl':''}">${horizonLabels[h]||h}</th>`).join('');
    const rows = order.filter(k=>ev.reactions[k]).map(k=>{
      const a = ev.reactions[k];
      const isYield = (a.asset === 'bond');
      const cells = horizons.map(h=>{
        if(a.status !== 'ok') return `<td class=" ${h===activeH?'hl':''}">—</td>`;
        let display;
        if(isYield && a.changes_pt && a.changes_pt[h] != null){
          // 利回りは絶対変化幅(pt)で表示
          const pt = a.changes_pt[h];
          display = (pt > 0 ? '+' : '') + pt.toFixed(2) + 'pt';
          const v = pt; // cls()用
          return `<td class="${cls(v)} ${h===activeH?'hl':''}">${display}</td>`;
        } else {
          // それ以外は相対変化率(%)
          const v = (a.changes && a.changes[h] != null) ? a.changes[h] : null;
          return `<td class="${cls(v)} ${h===activeH?'hl':''}">${pct(v)}</td>`;
        }
      }).join('');
      const rnote = a.restricted ? ' <span class="restricted-note">(派生値)</span>' : '';
      const yieldNote = isYield ? ' <span class="restricted-note">(変化幅pt)</span>' : '';
      return `<tr><td><span class="asset-name"><span class="swatch ${a.asset}"></span>${a.label}${rnote}${yieldNote}</span></td>${cells}</tr>`;
    }).join('');
    return `<tr><th>資産</th>${thHorizons}</tr>${rows}`;
  }

  // 同じ原因タグを持つ他イベント（＝この局面グループ）
  const related = (data.events||[]).filter(e=>e.id!==ev.id && (e.cause_tags||[]).some(t=>causeTags.includes(t)));
  const relatedHtml = related.length
    ? related.map(e=>`<a href="event_detail.html?id=${e.id}">${e.date} ${e.name}</a>`).join(' ')
    : '<span style="color:var(--ink-soft);font-size:13px;">同じ原因タグの他イベントはまだ登録されていません。</span>';

  // 参照元
  const sources = ev.sources || [];
  const sourcesHtml = sources.length
    ? `<ul>${sources.map(s=>`<li><a href="${s.url}" target="_blank" rel="noopener noreferrer">${s.title} ↗</a></li>`).join('')}</ul>
       <div class="src-note">外部サイトへのリンクです。内容は各サイトの責任に帰属します。</div>`
    : '<span style="color:var(--ink-soft);font-size:13px;">参照元は未登録です。</span>';

  // 類似根拠
  const reasonHtml = ev.similarity_reason
    ? `<div class="section-label">なぜ類似局面と見なすか</div>
       <div class="reason"><div class="reason-box"><p>${ev.similarity_reason}</p></div></div>`
    : '';

  // なぜこの反応になったのか
  const whyHtml = ev.why_reaction
    ? `<div class="section-label">なぜこの反応になったのか</div>
       <div class="why"><p>${ev.why_reaction}</p></div>`
    : '';

  // 結果が分かれた局面との対比（双方向：正引き＋逆引き）
  const eventNames = data.event_names || {};

  function renderContrastCard(c, thisName, thisId, otherName, otherId) {
    return `<div class="contrast"><div class="contrast-card">
      <div class="contrast-axis">分岐の軸： <b>${c.axis}</b></div>
      <div class="contrast-sides">
        <div class="contrast-side this">
          <div class="role">このイベント</div>
          <div class="ev-name">${thisName}</div>
          <div class="side-axis">${c.this_side||''}</div>
        </div>
        <div class="contrast-mid">⇄</div>
        <div class="contrast-side">
          <div class="role">対照イベント</div>
          <div class="ev-name"><a href="event_detail.html?id=${otherId}">${otherName}</a></div>
          <div class="side-axis">${c.other_side||''}</div>
        </div>
      </div>
      <div class="contrast-outcome">${c.outcome_note||''}</div>
    </div></div>`;
  }

  // 正引きcontrast（このイベントに書いてある対比）
  const contrastList = ev.contrast || [];
  const forwardCards = contrastList.map(c => {
    const otherName = eventNames[c.with] || c.with;
    return renderContrastCard(c, ev.name, ev.id, otherName, c.with);
  });

  // 逆引きcontrast（他のイベントがこのイベントをwithとして参照しているもの）
  const reverseList = ev.reverse_contrast || [];
  const reverseCards = reverseList.map(c => {
    const otherName = eventNames[c.from] || c.from_name || c.from;
    return renderContrastCard(c, ev.name, ev.id, otherName, c.from);
  });

  const allCards = [...forwardCards, ...reverseCards];
  const contrastHtml = allCards.length
    ? `<div class="section-label">結果が分かれた局面との対比</div>` + allCards.join('')
    : '';

  // 過去データから読み取れる傾向（key_insight）。注記を必ず付ける。
  const insightHtml = ev.key_insight
    ? `<div class="section-label">過去データから読み取れる傾向</div>
       <div class="insight"><div class="insight-box">
         <p>${ev.key_insight}</p>
         <p class="insight-note">これは過去の傾向であり、将来を保証するものではありません。特定の取引・銘柄・商品を推奨するものでもありません。</p>
       </div></div>`
    : '';

  content.innerHTML = `
    <div class="breadcrumb"><a href="index.html">トップ</a> ／ <a href="similar_events.html?tag=${primaryCause}">${causeLabels[primaryCause]||primaryCause}</a> ／ ${ev.name}</div>

    <div class="ev-head">
      <div class="date">発生日: ${ev.date}</div>
      ${catBadge}
      <h1>${ev.name}</h1>
      <p>${ev.description}</p>
      <div class="tag-block">
        <span class="tag-label">原因</span>
        <div class="tags">${causeHtml}</div>
      </div>
      <div class="tag-block">
        <span class="tag-label">結果（実データから自動判定）</span>
        <div class="effects">${effectHtml}</div>
        ${effectConflictNote}
        ${effectTags.length ? `<div style="font-family:var(--mono);font-size:10px;color:var(--ink-soft);margin-top:6px;opacity:0.75;">括弧内の日数は、1日後・7日後・30日後のうち、判定閾値を超えた期間を示します。</div>` : ''}
      </div>
    </div>

    <div class="section-label">想定される伝播パターン</div>
    <div class="prop"><div class="prop-flow">${flowHtml || '<span style="color:var(--ink-soft)">記録なし</span>'}</div></div>

    ${reasonHtml}

    ${renderContextSnapshot(ev)}

    <div class="section-label">発生後の各資産の変化（実データ）</div>
    <div class="horizon-switch" id="horizon-switch">
      ${horizons.map((h,i)=>`<span class="hbtn ${h==='d30'?'active':''}" data-h="${h}">${horizonLabels[h]||h}</span>`).join('')}
    </div>
    <div class="react-wrap">
      <table class="react"><tbody id="react-body">${buildTable('d30')}</tbody></table>
    </div>
    <div class="react-note">基準日: ${ev.date} 時点（休場の場合は直前の取引日）。数値は基準日からのおおよその変化率。一部系列は再配布制限のため派生値のみ。出典: FRED 等。</div>
    ${(()=>{
      const total = Object.keys(ev.reactions||{}).length;
      const errorCount  = Object.values(ev.reactions||{}).filter(a=>a.status==='error').length;
      const nodataCount = Object.values(ev.reactions||{}).filter(a=>a.status==='no_data').length;
      if(errorCount >= 1)
        return `<div class="react-note" style="color:var(--ink-soft);border-top:1px dashed var(--line-rule);margin-top:6px;padding-top:8px;">⚠ 一部資産のデータを一時的に取得できませんでした（${errorCount}/${total}系列）。</div>`;
      if(nodataCount >= 2)
        return `<div class="react-note" style="color:var(--ink-soft);border-top:1px dashed var(--line-rule);margin-top:6px;padding-top:8px;">⚠ 一部資産は、当時の系列提供範囲外または商品設定前のため、データを表示できません（${nodataCount}/${total}系列）。</div>`;
      return '';
    })()}

    <div id="timeline-section"></div>

    ${whyHtml}

    ${contrastHtml}

    ${insightHtml}

    <div class="section-label">この局面が属する類似グループ（同じ原因）</div>
    <div class="related">${relatedHtml}</div>

    <div class="section-label">参照元</div>
    <div class="sources">${sourcesHtml}</div>

    <footer>
      <a class="back" href="similar_events.html?tag=${primaryCause}">← ${causeLabels[primaryCause]||primaryCause} の一覧へ</a>
      <div class="disclaimer">本ページの数値は過去の事実の記録であり、将来の値動きを示すものでも、特定の取引・銘柄・商品を推奨するものでもありません。各イベントの前提条件は異なり、同様の結果が将来も再現される保証はありません。結果タグは1日後・7日後・30日後の実データから機械的に判定したものです。</div>
    </footer>
  `;

  // 期間切替の挙動
  document.querySelectorAll('#horizon-switch .hbtn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('#horizon-switch .hbtn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('react-body').innerHTML = buildTable(btn.dataset.h);
    });
  });
})();
</script>

<script type="module">
import { supabase } from './assets/js/supabase-client.js';

(async function initTimeline() {
  const params = new URLSearchParams(location.search);
  const eventId = params.get('id');
  if (!eventId) return;

  // #timeline-section が DOM に現れるまで待つ（非同期IIFEによるinnerHTML設定を待つ）
  const section = await waitForElement('timeline-section');
  if (!section) return;

  // ローディング表示
  const loadEl = document.createElement('div');
  loadEl.className = 'tl-loading';
  loadEl.textContent = '方向推移データを読み込み中…';
  section.appendChild(loadEl);

  // セッション取得
  let session = null;
  try {
    const { data } = await supabase.auth.getSession();
    session = data.session;
  } catch (_) {
    section.replaceChildren();
    return;
  }

  if (!session) {
    section.replaceChildren(buildGateBox('unauthenticated'));
    return;
  }

  // Timeline API 呼び出し
  let apiResult = null;
  try {
    const { data, error } = await supabase.functions.invoke('get-event-reaction-timeline', {
      body: { event_id: eventId },
    });
    if (error) {
      const status = error.context?.status ?? error.status ?? null;
      section.replaceChildren(buildErrorFrag(status));
      return;
    }
    apiResult = data;
  } catch (_) {
    section.replaceChildren(buildErrorFrag('network'));
    return;
  }

  if (!apiResult) {
    section.replaceChildren(buildErrorFrag('invalid'));
    return;
  }

  section.replaceChildren(buildTimelineContent(apiResult));
})();

function waitForElement(id, maxMs) {
  maxMs = maxMs || 6000;
  return new Promise(function(resolve) {
    var el = document.getElementById(id);
    if (el) { resolve(el); return; }
    var start = Date.now();
    var root = document.getElementById('content') || document.body;
    var obs = new MutationObserver(function() {
      var found = document.getElementById(id);
      if (found || Date.now() - start > maxMs) {
        obs.disconnect();
        resolve(found || null);
      }
    });
    obs.observe(root, { childList: true, subtree: true });
  });
}

var DIR_SYMBOL = { up: '↑', down: '↓', flat: '→', na: '—' };
var DIR_LABEL  = { up: '上昇', down: '下降', flat: '横ばい', na: 'データなし' };
var HORIZON_LABELS = { d1: '1日後', d7: '7日後', d30: '30日後', d90: '90日後' };

function buildTimelineContent(data) {
  var frag = document.createDocumentFragment();

  var sLabel = document.createElement('div');
  sLabel.className = 'section-label';
  sLabel.textContent = '価格反応の方向推移（プレミアム）';
  frag.appendChild(sLabel);

  var wrap = document.createElement('div');
  wrap.className = 'tl-section';

  if (data.disclaimer) {
    var note = document.createElement('div');
    note.className = 'tl-disclaimer';
    note.textContent = data.disclaimer;
    wrap.appendChild(note);
  }

  var assets = Array.isArray(data.assets) ? data.assets : [];
  if (assets.length > 0) {
    var tWrap = document.createElement('div');
    tWrap.className = 'tl-wrap';
    tWrap.appendChild(buildDirectionTable(assets));
    wrap.appendChild(tWrap);
  } else {
    var noData = document.createElement('div');
    noData.className = 'tl-nodata';
    noData.textContent = 'このイベントの方向データがありません。';
    wrap.appendChild(noData);
  }

  frag.appendChild(wrap);
  return frag;
}

function buildDirectionTable(assets) {
  var horizons = ['d1', 'd7', 'd30', 'd90'];
  var table = document.createElement('table');
  table.className = 'tl-table';

  var thead = document.createElement('thead');
  var hrow = document.createElement('tr');
  var thAsset = document.createElement('th');
  thAsset.scope = 'col';
  thAsset.textContent = '資産';
  hrow.appendChild(thAsset);
  for (var hi = 0; hi < horizons.length; hi++) {
    var th = document.createElement('th');
    th.scope = 'col';
    th.style.textAlign = 'center';
    th.textContent = HORIZON_LABELS[horizons[hi]] || horizons[hi];
    hrow.appendChild(th);
  }
  var thJudge = document.createElement('th');
  thJudge.scope = 'col';
  thJudge.textContent = '判定';
  hrow.appendChild(thJudge);
  thead.appendChild(hrow);
  table.appendChild(thead);

  var tbody = document.createElement('tbody');
  for (var ai = 0; ai < assets.length; ai++) {
    var asset = assets[ai];
    var tr = document.createElement('tr');

    var tdName = document.createElement('td');
    tdName.textContent = asset.label || asset.asset_key || '';
    tr.appendChild(tdName);

    var dirs = asset.directions || {};
    for (var hj = 0; hj < horizons.length; hj++) {
      var h = horizons[hj];
      var td = document.createElement('td');
      td.className = 'tl-dir';
      var dir = dirs[h] || 'na';
      var span = document.createElement('span');
      span.setAttribute('aria-label', DIR_LABEL[dir] || dir);
      span.textContent = DIR_SYMBOL[dir] || '—';
      if (dir === 'up') span.className = 'dir-up';
      else if (dir === 'down') span.className = 'dir-down';
      else span.className = 'dir-flat';
      td.appendChild(span);
      tr.appendChild(td);
    }

    var tdJudge = document.createElement('td');
    if (asset.mid_term_reversal) {
      var badge = document.createElement('span');
      badge.className = 'dir-reversal';
      badge.textContent = '中期反転';
      badge.title = '初動（1日後）と中期（30日後）で方向が異なります';
      tdJudge.appendChild(badge);
    }
    tr.appendChild(tdJudge);

    tbody.appendChild(tr);
  }
  table.appendChild(tbody);
  return table;
}

function buildGateBox(reason) {
  var frag = document.createDocumentFragment();

  var sLabel = document.createElement('div');
  sLabel.className = 'section-label';
  sLabel.textContent = '価格反応の方向推移';
  frag.appendChild(sLabel);

  var gate = document.createElement('div');
  gate.className = 'tl-gate';
  var inner = document.createElement('div');
  inner.className = 'tl-gate-inner';

  var msg = document.createElement('p');
  msg.className = 'tl-gate-msg';
  if (reason === 'unauthenticated') {
    msg.textContent = 'ログインすると、各資産の価格変化の方向パターン・中期反転の有無を確認できます。';
  } else {
    msg.textContent = '有料プランでは、各資産の価格変化の方向パターン・中期反転の有無を確認できます。';
  }
  inner.appendChild(msg);

  var links = document.createElement('div');
  links.className = 'tl-gate-links';
  if (reason === 'unauthenticated') {
    var a1 = document.createElement('a');
    a1.href = 'login.html';
    a1.className = 'tl-gate-link';
    a1.textContent = 'ログインする';
    links.appendChild(a1);
  }
  var a2 = document.createElement('a');
  a2.href = 'pricing.html';
  a2.className = 'tl-gate-link';
  a2.textContent = '有料プランを見る';
  links.appendChild(a2);
  inner.appendChild(links);
  gate.appendChild(inner);
  frag.appendChild(gate);
  return frag;
}

function buildErrorFrag(status) {
  var frag = document.createDocumentFragment();
  var sLabel = document.createElement('div');
  sLabel.className = 'section-label';
  sLabel.textContent = '価格反応の方向推移';
  frag.appendChild(sLabel);

  var box = document.createElement('div');
  box.className = 'tl-error';
  box.setAttribute('role', 'alert');

  if (status === 403) {
    box.textContent = '有料プランでご利用いただける機能です。';
    var link = document.createElement('a');
    link.href = 'pricing.html';
    link.className = 'tl-error-link';
    link.textContent = '有料プランを見る';
    box.appendChild(link);
  } else if (status === 401) {
    box.textContent = 'セッションが切れました。再度ログインしてください。';
  } else if (status === 404) {
    box.textContent = 'このイベントの推移データが見つかりませんでした。';
  } else if (status === 503) {
    box.textContent = '方向推移データを一時的に取得できませんでした。上記の数値テーブルでご確認ください。';
  } else {
    box.textContent = '方向推移データの取得に失敗しました。上記の数値テーブルでご確認ください。';
  }
  frag.appendChild(box);
  return frag;
}
</script>

<script type="module" src="assets/js/auth-common.js"></script>
</body>
